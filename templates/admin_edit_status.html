<!DOCTYPE html>
<html>
<head>
    <title>Update Complaint Status</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #667eea, #764ba2);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        .card {
            background: white;
            padding: 30px;
            width: 450px;
            border-radius: 12px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
        }

        h2 {
            text-align: center;
            margin-bottom: 20px;
            color: #333;
        }

        .detail {
            margin-bottom: 15px;
        }

        .detail strong {
            color: #555;
        }

        select {
            width: 100%;
            padding: 10px;
            border-radius: 6px;
            border: 1px solid #ccc;
            margin-top: 8px;
            font-size: 14px;
        }

        button {
            width: 100%;
            padding: 10px;
            margin-top: 20px;
            border: none;
            border-radius: 6px;
            background-color: #667eea;
            color: white;
            font-size: 16px;
            cursor: pointer;
            transition: 0.3s;
        }

        button:hover {
            background-color: #5a67d8;
        }

        .back {
            text-align: center;
            margin-top: 15px;
        }

        .back a {
            text-decoration: none;
            color: #667eea;
            font-weight: bold;
        }

        .back a:hover {
            text-decoration: underline;
        }

        .status-badge {
            display: inline-block;
            padding: 5px 10px;
            border-radius: 20px;
            font-size: 13px;
            color: white;
        }

        .pending { background-color: orange; }
        .assigned { background-color: #3498db; }
        .resolved { background-color: #2ecc71; }
    </style>
</head>
<body>

    <div class="card">
        <h2>Update Complaint Status</h2>

        <div class="detail">
            <strong>Title:</strong><br>
            {{ complaint[1] }}
        </div>

        <div class="detail">
            <strong>Description:</strong><br>
            {{ complaint[2] }}
        </div>

        <div class="detail">
            <strong>Current Status:</strong><br>
            <span class="status-badge 
                {% if complaint[4] == 'Pending' %}pending
                {% elif complaint[4] == 'Assigned' %}assigned
                {% else %}resolved{% endif %}">
                {{ complaint[4] }}
            </span>
        </div>

        <form method="POST">
            <label><strong>Change Status:</strong></label>
            <select name="status" required>
                <option value="Pending" {% if complaint[4] == 'Pending' %}selected{% endif %}>Pending</option>
                <option value="Assigned" {% if complaint[4] == 'Assigned' %}selected{% endif %}>Assigned</option>
                <option value="Resolved" {% if complaint[4] == 'Resolved' %}selected{% endif %}>Resolved</option>
            </select>

            <button type="submit">Update Status</button>
        </form>

        <div class="back">
            <a href="{{ url_for('admin_dashboard') }}">← Back to Dashboard</a>
        </div>
    </div>

</body>
</html>
