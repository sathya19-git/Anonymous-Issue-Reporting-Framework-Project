<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Student Dashboard</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background: linear-gradient(135deg, #a1c4fd, #c2e9fb);
            min-height: 100vh;
            padding: 50px;
        }
        .card-hover:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 25px rgba(0,0,0,0.3);
            transition: 0.3s;
        }
        .card-title {
            font-weight: bold;
            color: #333;
        }
        .logout-btn {
            position: fixed;
            top: 20px;
            right: 20px;
        }
    </style>
</head>
<body>

<!-- Logout Button -->
<a href="/logout" class="btn btn-danger logout-btn">Logout</a>

<div class="container">
    <h2 class="mb-4">WELCOME {{ student_register }}</h2>
    <div class="row g-4">
        <!-- Submit Complaint -->
        <div class="col-md-6">
            <div class="card card-hover text-center p-4">
                <h4 class="card-title">Submit Complaint</h4>
                <p>Report any issue anonymously or with your details</p>
                <a href="/complaint" class="btn btn-primary">Go</a>
            </div>
        </div>

        <!-- View Complaints -->
        <div class="col-md-6">
            <div class="card card-hover text-center p-4">
                <h4 class="card-title">View My Complaints</h4>
                <p>Check status of your previously submitted complaints</p>
                <a href="/my_complaints" class="btn btn-success">Go</a>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
