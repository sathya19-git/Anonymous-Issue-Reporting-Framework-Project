<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Edit Complaint</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<div class="container py-5">
    <h2 class="mb-4">✏ Edit Complaint</h2>
    <form method="POST">
        <div class="mb-3">
            <label class="form-label">Title</label>
            <input type="text" class="form-control" name="title" value="{{ complaint[0] }}" required>
        </div>

        <div class="mb-3">
            <label class="form-label">Description</label>
            <textarea class="form-control" name="description" rows="5" required>{{ complaint[1] }}</textarea>
        </div>

        <div class="mb-3">
            <label class="form-label">Severity</label>
            <select class="form-select" name="severity" required>
                <option value="Low" {% if complaint[2] == 'Low' %}selected{% endif %}>Low</option>
                <option value="Medium" {% if complaint[2] == 'Medium' %}selected{% endif %}>Medium</option>
                <option value="High" {% if complaint[2] == 'High' %}selected{% endif %}>High</option>
            </select>
        </div>

        <button type="submit" class="btn btn-success">Save Changes</button>
        <a href="/my_complaints" class="btn btn-secondary">Cancel</a>
    </form>
</div>
</body>
</html>
